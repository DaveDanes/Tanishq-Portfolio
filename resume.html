<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resume - Tanishq</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg-primary: #0a0a0b;
        --bg-secondary: #121214;
        --bg-card: rgba(255, 255, 255, 0.02);
        --text-primary: #ffffff;
        --text-secondary: #a0a0ab;
        --accent-primary: #8b5cf6;
        --accent-secondary: #3b82f6;
        --border-subtle: rgba(255, 255, 255, 0.05);
        --font-sans: "Inter", sans-serif;
        --font-display: "Space Grotesk", sans-serif;
        --font-mono: "JetBrains Mono", monospace;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: var(--font-sans);
        background-color: var(--bg-primary);
        color: var(--text-primary);
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        background-color: var(--bg-secondary);
        border-bottom: 1px solid var(--border-subtle);
        flex-shrink: 0;
      }

      .toolbar-title {
        font-family: var(--font-display);
        font-size: 1.25rem;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .toolbar-actions {
        display: flex;
        gap: 1rem;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        font-family: var(--font-mono);
        font-size: 0.875rem;
        font-weight: 500;
        text-decoration: none;
        transition: all 0.2s ease;
        cursor: pointer;
      }

      .btn-pdf {
        background-color: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.2);
      }

      .btn-pdf:hover {
        background-color: rgba(239, 68, 68, 0.2);
        border-color: rgba(239, 68, 68, 0.4);
      }

      .btn-word {
        background-color: rgba(59, 130, 246, 0.1);
        color: #3b82f6;
        border: 1px solid rgba(59, 130, 246, 0.2);
      }

      .btn-word:hover {
        background-color: rgba(59, 130, 246, 0.2);
        border-color: rgba(59, 130, 246, 0.4);
      }

      .viewer-container {
        flex-grow: 1;
        width: 100%;
        background-color: #1a1a1c;
      }

      iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      @media (max-width: 600px) {
        .toolbar {
          flex-direction: column;
          gap: 1rem;
          padding: 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="toolbar-title">Resume Viewer</div>
      <div class="toolbar-actions">
        <!-- We use the "download" attribute so it triggers a download instead of opening in tab -->
        <a href="Tanishq_Resume.pdf" download class="btn btn-pdf">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            ></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <path d="M12 18v-6"></path>
            <path d="M9 15l3 3 3-3"></path>
          </svg>
          Download PDF
        </a>
        <a href="Tanishq_Resume.docx" download class="btn btn-word">
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"
            ></path>
            <polyline points="14 2 14 8 20 8"></polyline>
            <path d="M12 18v-6"></path>
            <path d="M9 15l3 3 3-3"></path>
          </svg>
          Download Word
        </a>
      </div>
    </div>
    <div class="viewer-container">
      <!-- The iframe attempts to view the PDF natively in the browser -->
      <!-- If the user hasn't uploaded Tanishq_Resume.pdf, it will show a 404 in the iframe instead -->
      <iframe src="Tanishq_Resume.pdf" title="Resume PDF Viewer"></iframe>
    </div>
  </body>
</html>
